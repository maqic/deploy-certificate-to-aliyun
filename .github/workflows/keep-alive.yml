# 每周保活：更新 README 时间戳并提交，保持仓库有定期 commit
name: Keep Alive

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日 02:00 UTC = 北京时间 10:00
  workflow_dispatch:     # 支持手动触发

permissions:
  contents: write        # 允许 push

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update last modified time in README
        run: |
          current_time=$(date '+%Y-%m-%d %H:%M:%S')
          if ! grep -q "最后更新" README.md; then
            echo "" >> README.md
            echo "---" >> README.md
            echo "最后更新: $current_time" >> README.md
          else
            sed -i "s/最后更新:.*/最后更新: $current_time/" README.md
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: 更新最后修改时间 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
